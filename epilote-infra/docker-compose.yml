version: "3.9"

services:

  backend:
    image: epilote-backend:latest
    build:
      context: ../epilote-backend
      dockerfile: Dockerfile
    env_file: .env
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - sync-gateway

  sync-gateway:
    image: couchbase/sync-gateway:3.2.0
    volumes:
      - ./sync-gateway-config.json:/etc/sync_gateway/config.json:ro
    restart: always
    ports:
      - "4984:4984"
      - "4985:4985"
    environment:
      - COUCHBASE_CONNECTION_STRING=${CB_CONNECTION_STRING}
      - COUCHBASE_USERNAME=${CB_USERNAME}
      - COUCHBASE_PASSWORD=${CB_PASSWORD}

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - sync-gateway
