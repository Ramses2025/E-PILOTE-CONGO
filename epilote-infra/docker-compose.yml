version: "3.9"

# Sync Gateway self-hosted SUPPRIMÉ — on utilise Capella App Services (géré par Couchbase Cloud)
# URL App Services : wss://x0by7zekx39pidsy.apps.cloud.couchbase.com:4984/epilote

services:

  backend:
    image: epilote-backend:latest
    build:
      context: ../epilote-backend
      dockerfile: Dockerfile
    env_file: .env
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
